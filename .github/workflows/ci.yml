name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov black pylint bandit

      - name: Black formatting check
        run: black --check . --exclude "venv|.git|models" || true

      - name: Pylint
        run: |
          pylint agents/ brain/ backtesting/ data/ trading/ config/ executor/ \
            --disable=missing-docstring --fail-under=7.0 || true

      - name: Bandit security
        run: bandit -r . -ll --exclude venv || true

      - name: Run pytest
        run: pytest tests/ -v --cov=. --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v3

  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - run: pip install black pylint isort flake8
      - run: isort . --check-only --diff || true
      - run: flake8 . --max-line-length=100 --exclude=venv || true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - run: pip install bandit safety
      - run: bandit -r . -ll --exclude venv,tests -f json || true
      - run: safety check --json || true